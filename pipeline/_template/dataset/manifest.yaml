# Dataset manifest — validated by contracts.DatasetManifest before any analysis.
# Fill every checksum + pin every image by @sha256: digest. Copy this into
# pipeline/datasets/<id>/manifest.yaml for a new ingest.
dataset_id: example_dataset
title: Example Perturb-seq dataset
license: CC-BY-4.0            # must be in ALLOWED_LICENSES
doi: null
geo_series: null
aligner: starsolo            # or kb_python
schema_version: 0.1.0
seed: 0
runs:
  - {accession: SRRXXXXXXX, sample: s1, library_type: gex,   md5: {R1.fastq.gz: "<md5>", R2.fastq.gz: "<md5>"}}
  - {accession: SRRYYYYYYY, sample: s1, library_type: guide, md5: {R1.fastq.gz: "<md5>", R2.fastq.gz: "<md5>"}}
chemistry: {version: 10x_v3, whitelist_name: 3M-february-2018, whitelist_md5: "<md5>", cb_len: 16, umi_len: 12}
reference:
  genome_build: GRCh38
  annotation: GENCODE_v44
  fasta_url: "<url>"
  fasta_md5: "<md5>"
  gtf_url: "<url>"
  gtf_md5: "<md5>"
  sjdb_overhang: 90
guide_library:
  protospacer_fasta_url: "<url>"
  protospacer_md5: "<md5>"
  guide_to_target_url: "<url>"
  guide_to_target_md5: "<md5>"
  ntc_guide_ids: [NTC_1, NTC_2]
  moi: low
images:
  - {stage: fetch,    image: "ghcr.io/spot/fetch@sha256:<digest>"}
  - {stage: fastp,    image: "ghcr.io/spot/fastp@sha256:<digest>"}
  - {stage: starsolo, image: "ghcr.io/spot/starsolo@sha256:<digest>"}
  - {stage: guide,    image: "ghcr.io/spot/kite@sha256:<digest>"}
  - {stage: cellqc,   image: "ghcr.io/spot/cellqc@sha256:<digest>"}
  - {stage: de,       image: "ghcr.io/spot/de@sha256:<digest>"}
de: {model: deseq2, contrast: target_vs_ntc, min_cells_per_perturbation: 25, padj_threshold: 0.05}
