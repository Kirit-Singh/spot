<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>spot</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='4' fill='%23FAF9F7'/%3E%3Ccircle cx='8' cy='8' r='4.6' fill='%233E7D8C'/%3E%3C/svg%3E">
<style>
  :root{
    --bg:#FAF9F7;
    --surface:#FFFFFF;
    --line:#E7E3DC;
    --ink:#1E1B16;
    --muted:#8A8172;
    --accent:#3E7D8C;
    --serif:'Newsreader','Iowan Old Style','Palatino Linotype',Georgia,serif;
    --mono:'IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
    --wordmark:clamp(58px,13vw,84px);
    /* Measured ink of this serif at the wordmark size: "spot" ascender .572em; the "o"
       spans .4932em above the baseline with a .0132em overshoot below it, putting the
       centre of the "o" at .24em above the baseline.

       The mark is .572em square (the ascender band) and the dot is centred in it, so the
       dot's centre sits .286em above the mark's bottom edge. --mark-drop is solved from
       the rendered geometry (not assumed from line-height) so that the dot's centre lands
       on the "o" centre at .24em: solved to .012em by sweeping the value in-page and
       least-squares fitting (slope -84px/em == -1x font-size). Verified at both clamp ends.

       The hit target stays >=48px even when the visible box is smaller, so both offsets
       back out that slack. Everything tracks the wordmark clamp. */
    --mark:calc(var(--wordmark) * .572);
    --hit:max(48px,var(--mark));
    --slack:calc((var(--hit) - var(--mark)) / 2);
    --mark-drop:calc(var(--wordmark) * .012 - var(--slack));
    --gap:calc(var(--wordmark) * .1 - var(--slack));
  }
  *{box-sizing:border-box}
  html{height:100%;color-scheme:light}
  body{
    min-height:100%;
    min-height:100dvh;
    margin:0;
    display:grid;
    place-items:center;
    overflow:hidden;
    padding:max(24px,env(safe-area-inset-top)) max(20px,env(safe-area-inset-right)) max(24px,env(safe-area-inset-bottom)) max(20px,env(safe-area-inset-left));
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter Tight',system-ui,-apple-system,sans-serif;
  }
  .landing{width:100%;display:grid;place-items:center}
  .lockup{position:relative;display:flex;align-items:flex-end;justify-content:center}
  h1{
    margin:0;
    font-family:var(--serif);
    font-size:var(--wordmark);
    font-weight:500;
    line-height:.82;
    letter-spacing:-.045em;
  }
  details{position:static;margin:0 0 var(--mark-drop) var(--gap)}
  summary{
    width:var(--hit);   /* >=48px target, may exceed the visible box */
    height:var(--hit);
    display:grid;
    place-items:center;
    cursor:pointer;
    list-style:none;
    -webkit-tap-highlight-color:transparent;
  }
  summary::-webkit-details-marker{display:none}
  summary::marker{content:''}
  summary:focus-visible{outline:none}
  summary:focus-visible .mark{outline:2px solid var(--accent);outline-offset:3px}
  /* The tab-icon lockup: rounded square (rx 4/16 = 25%) holding the teal dot.
     Raised and reactive, so it reads as pressable rather than decorative. */
  .mark{
    width:var(--mark);
    height:var(--mark);
    display:block;
    border:1px solid var(--line);
    border-radius:25%;
    background:var(--surface);
    box-shadow:0 2px 6px rgba(30,27,22,.10),0 1px 2px rgba(30,27,22,.05);
    transition:transform 140ms ease,box-shadow 140ms ease,border-color 140ms ease;
  }
  summary:hover .mark{
    border-color:var(--accent);
    box-shadow:0 6px 16px rgba(30,27,22,.16),0 2px 4px rgba(30,27,22,.07);
    transform:translateY(-2px);
  }
  summary:active .mark{transform:translateY(0);box-shadow:0 1px 3px rgba(30,27,22,.12)}
  details[open] .mark{border-color:var(--accent)}
  .mark svg{width:100%;height:100%;display:block}
  .panel{
    position:absolute;
    top:calc(100% + 22px);
    /* Start exactly at the wordmark's left edge. The field grows to the right,
       while the max width keeps it inside a narrow viewport. */
    left:0;
    width:min(316px,calc(50vw + 50% - 20px));
    animation:reveal 140ms ease-out both;
  }
  .access-form{margin:0}
  .row{display:flex;align-items:center;gap:10px}
  .control{
    flex:1;
    min-width:0;
    max-width:272px;
    height:44px;
    display:grid;
    grid-template-columns:minmax(0,1fr) auto 44px;
    overflow:hidden;
    border:1px solid var(--line);
    border-radius:9px;
    background:var(--surface);
    box-shadow:0 2px 9px rgba(30,27,22,.12);
  }
  /* Reveal and info are JS-only affordances: they ship hidden and are unhidden by the
     inline script, so no dead control is ever presented when JavaScript is unavailable. */
  .reveal{
    width:38px;
    display:grid;
    place-items:center;
    border:0;
    background:transparent;
    color:var(--muted);
    cursor:pointer;
  }
  .reveal:hover{color:var(--ink)}
  .reveal svg{width:17px;height:17px;display:block}
  .reveal .eye-off{display:none}
  .reveal[aria-pressed="true"]{color:var(--accent)}
  .reveal[aria-pressed="true"] .eye-off{display:block}
  .info{
    flex:none;
    width:28px;
    height:28px;
    display:grid;
    place-items:center;
    padding:0;
    border:0;
    border-radius:50%;
    background:transparent;
    color:var(--muted);
    cursor:pointer;
    transition:color 140ms ease;
  }
  .info:hover{color:var(--accent)}
  .info svg{width:20px;height:20px;display:block}
  input{
    min-width:0;
    border:0;
    outline:0;
    padding:0 13px;
    background:transparent;
    color:var(--ink);
    font-family:var(--mono);
    font-size:16px;
    line-height:1;
  }
  input::placeholder{color:var(--muted);opacity:1}
  input[aria-invalid="true"]{box-shadow:inset 0 0 0 1.5px var(--muted)}
  .submit{
    border:0;
    border-left:1px solid var(--line);
    background:var(--surface);
    color:var(--accent);
    font-family:var(--mono);
    font-size:19px;
    line-height:1;
    cursor:pointer;
  }
  .submit:hover{background:var(--accent);color:var(--surface)}
  input:focus-visible,.submit:focus-visible{outline:2px solid var(--accent);outline-offset:-3px}
  .status{
    min-height:16px;
    margin:7px 2px 0;
    color:var(--muted);
    font-family:var(--mono);
    font-size:10.5px;
    line-height:1.4;
    text-align:left;
  }
  .sr-only{
    position:absolute;
    width:1px;
    height:1px;
    padding:0;
    margin:-1px;
    overflow:hidden;
    clip:rect(0,0,0,0);
    white-space:nowrap;
    border:0;
  }
  /* About modal: a links-list sheet, same tokens as the access control. */
  dialog{
    width:min(320px,calc(100vw - 40px));
    padding:0;
    border:1px solid var(--line);
    border-radius:12px;
    background:var(--surface);
    color:var(--ink);
    box-shadow:0 18px 46px rgba(30,27,22,.20);
  }
  dialog::backdrop{background:rgba(30,27,22,.28)}
  .sheet{padding:20px}
  .sheet h2{
    margin:0 0 8px;
    font-family:var(--serif);
    font-size:26px;
    font-weight:500;
    letter-spacing:-.03em;
  }
  .sheet p{
    margin:0 0 16px;
    font-size:13px;
    line-height:1.5;
    color:var(--muted);
  }
  .links{margin:0;padding:0;list-style:none;border-top:1px solid var(--line)}
  .links a{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    padding:11px 2px;
    border-bottom:1px solid var(--line);
    color:var(--ink);
    font-family:var(--mono);
    font-size:12px;
    text-decoration:none;
  }
  .links a:hover{color:var(--accent)}
  .links a span{color:var(--muted)}
  .links a:hover span{color:var(--accent)}
  .close{
    margin-top:16px;
    width:100%;
    height:36px;
    border:1px solid var(--line);
    border-radius:8px;
    background:var(--surface);
    color:var(--muted);
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:.06em;
    cursor:pointer;
  }
  .close:hover{border-color:var(--accent);color:var(--accent)}
  /* Must out-specify `.sheet p` (0,1,1), which otherwise wins over a bare `.credit`. */
  .sheet .credit{
    margin:26px 0 0;
    text-align:center;
    font-family:var(--mono);
    font-size:9px;
    letter-spacing:.1em;
    color:var(--muted);
  }
  .reveal:focus-visible,.info:focus-visible,.close:focus-visible,.links a:focus-visible{
    outline:2px solid var(--accent);
    outline-offset:2px;
  }
  @keyframes reveal{
    from{opacity:0;transform:translateY(-5px)}
    to{opacity:1;transform:translateY(0)}
  }
  @media (prefers-reduced-motion:reduce){
    .mark{transition:none}
    summary:hover .mark,summary:active .mark{transform:none}
    .panel{animation:none}
  }
  @media (forced-colors:active){
    .control{border-color:CanvasText;box-shadow:none}
    .mark{border-color:CanvasText;box-shadow:none}
    .mark circle{fill:ButtonText}
  }
</style>
</head>
<body>
<main class="landing">
  <div class="lockup">
    <h1>spot</h1>
    <details id="reviewer-access">
      <summary aria-label="Open reviewer access">
        <span class="mark" aria-hidden="true">
          <svg viewBox="0 0 16 16" focusable="false">
            <circle cx="8" cy="8" r="4.6" fill="#3E7D8C"/>
          </svg>
        </span>
      </summary>
      <div class="panel">
        <form class="access-form" method="post" action="/auth">
          <label class="sr-only" for="access-code">Access code</label>
          <div class="row">
            <div class="control">
              <input id="access-code" name="code" type="password" autocomplete="one-time-code" data-1p-ignore data-lpignore="true" data-bwignore data-form-type="other" placeholder="access code" required aria-describedby="access-status">
              <button class="reveal" id="reveal-code" type="button" aria-label="Show access code" aria-pressed="false" hidden>
                <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                  <path d="M1.7 10S4.8 4.7 10 4.7 18.3 10 18.3 10 15.2 15.3 10 15.3 1.7 10 1.7 10Z"/>
                  <circle cx="10" cy="10" r="2.4"/>
                  <path class="eye-off" d="M3.2 3.2 16.8 16.8"/>
                </svg>
              </button>
              <button class="submit" type="submit" aria-label="Open spot">&#8594;</button>
            </div>
            <button class="info" id="about-open" type="button" aria-label="About spot" aria-haspopup="dialog" hidden>
              <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.3" aria-hidden="true" focusable="false">
                <circle cx="10" cy="10" r="8.2"/>
                <path d="M10 9.2v5" stroke-linecap="round"/>
                <circle cx="10" cy="6.1" r=".95" fill="currentColor" stroke="none"/>
              </svg>
            </button>
          </div>
          <p class="status" id="access-status" role="status" aria-live="polite"></p>
        </form>
      </div>
    </details>
  </div>
</main>
<dialog id="about" aria-labelledby="about-title">
  <div class="sheet">
    <h2 id="about-title">spot</h2>
    <p>A five-stage research workbench, currently being assembled. Access is limited to reviewers while the work is in progress.</p>
    <ul class="links">
      <li><a href="https://github.com/Kirit-Singh/spot" target="_blank" rel="noopener noreferrer">GitHub<span aria-hidden="true">&#8599;</span></a></li>
      <li><a href="https://github.com/Kirit-Singh/spot/issues/new" target="_blank" rel="noopener noreferrer">Contact<span aria-hidden="true">&#8599;</span></a></li>
    </ul>
    <button class="close" id="about-close" type="button">Close</button>
    <p class="credit">Kirit Singh . 2026</p>
  </div>
</dialog>
<script>
  (()=>{
    const disclosure=document.querySelector('#reviewer-access');
    const summary=disclosure.querySelector('summary');
    const input=document.querySelector('#access-code');
    const status=document.querySelector('#access-status');
    const syncExpanded=()=>summary.setAttribute('aria-expanded',String(disclosure.open));

    disclosure.addEventListener('toggle',()=>{
      syncExpanded();
      if(disclosure.open)requestAnimationFrame(()=>input.focus());
    });
    syncExpanded();

    disclosure.addEventListener('keydown',(event)=>{
      if(event.key==='Escape'&&disclosure.open){
        disclosure.open=false;
        summary.focus();
      }
    });

    input.addEventListener('input',()=>{
      input.removeAttribute('aria-invalid');
      status.textContent='';
    });

    // Reveal and About are enhancements: they ship hidden so that, without JavaScript,
    // no dead control is offered. The native disclosure and POST form still work.
    const reveal=document.querySelector('#reveal-code');
    reveal.hidden=false;
    reveal.addEventListener('click',()=>{
      const shown=reveal.getAttribute('aria-pressed')==='true';
      reveal.setAttribute('aria-pressed',String(!shown));
      reveal.setAttribute('aria-label',shown?'Show access code':'Hide access code');
      input.type=shown?'password':'text';
      input.focus();
    });

    const about=document.querySelector('#about');
    const openAbout=document.querySelector('#about-open');
    openAbout.hidden=false;
    openAbout.addEventListener('click',()=>about.showModal());
    document.querySelector('#about-close').addEventListener('click',()=>about.close());
    about.addEventListener('click',(event)=>{
      if(event.target===about)about.close();
    });
    about.addEventListener('close',()=>openAbout.focus());

    const url=new URL(window.location.href);
    if(url.searchParams.get('access')==='invalid'){
      disclosure.open=true;
      input.setAttribute('aria-invalid','true');
      status.textContent='Code not recognized.';
      url.searchParams.delete('access');
      history.replaceState(null,'',url.pathname+url.search+url.hash);
      requestAnimationFrame(()=>input.focus());
    }
  })();
</script>
</body>
</html>
